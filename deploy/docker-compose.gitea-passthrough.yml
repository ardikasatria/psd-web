# Override compose — Gitea SSH passthrough (Path B).
# Port publish diatur lewat GITEA_SSH_PUBLISH di .env (bukan GITEA_SSH_PORT).
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.gitea-passthrough.yml up -d gitea backend

services:
  gitea:
    container_name: psd-gitea
    environment:
      GITEA__server__SSH_PORT: "22"
