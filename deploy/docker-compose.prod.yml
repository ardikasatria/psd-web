services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/psd-assets || true &&
      mc anonymous set download local/psd-assets || true &&
      mc mb -p local/psd-media || true &&
      mc anonymous set download local/psd-media || true &&
      mc mb -p local/psd-submissions || true
      "

  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY}
    volumes:
      - meilidata:/meili_data
    restart: unless-stopped

  backend:
    build: ../psd-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      BACKEND_CORS_ORIGINS: '["https://${DOMAIN}"]'
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: minio:9000
      MINIO_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: psd-assets
      STORAGE_ENABLED: "true"
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_MEDIA_BUCKET: psd-media
      S3_PUBLIC_BASE_URL: https://storage.${DOMAIN}/psd-media
      S3_ASSETS_BUCKET: psd-assets
      S3_ASSETS_PUBLIC_BASE_URL: https://storage.${DOMAIN}/psd-assets
      S3_SUBMISSIONS_BUCKET: psd-submissions
      APP_BASE_URL: https://${DOMAIN}
      COOKIE_NAME: psd_token
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: lax
      COOKIE_DOMAIN: .${DOMAIN}
      DEV_EMAIL_ECHO: "false"
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_KEY}
      PSD_OFFICIAL_USERNAME: psd
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      FACTORY_RUN_TIMEOUT_S: ${FACTORY_RUN_TIMEOUT_S:-90}
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ../psd-frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.${DOMAIN}
        NEXT_PUBLIC_USE_MOCKS: "false"
        NEXT_PUBLIC_APP_NAME: Projek Sains Data
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - frontend
      - backend
      - minio
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  meilidata:
  caddydata:
  caddyconfig:
