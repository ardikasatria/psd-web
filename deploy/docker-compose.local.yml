# Compose untuk uji VM lokal (tanpa domain/HTTPS).
#
#   cd deploy
#   export VM_IP=$(hostname -I | awk '{print $1}')
#   echo "VM_IP=${VM_IP}" >> .env.local
#   docker compose -f docker-compose.local.yml --env-file .env.local up -d --build

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-psd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psd}
      POSTGRES_DB: ${POSTGRES_DB:-psd}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psd}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-psd}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-psd-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-psd} ${MINIO_ROOT_PASSWORD:-psd-secret} &&
      mc mb -p local/psd-assets || true &&
      mc anonymous set download local/psd-assets || true &&
      mc mb -p local/psd-media || true &&
      mc anonymous set download local/psd-media || true &&
      mc mb -p local/psd-submissions || true
      "

  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-psd-search-key}
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

  backend:
    build: ../psd-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-psd}:${POSTGRES_PASSWORD:-psd}@db:5432/${POSTGRES_DB:-psd}
      REDIS_URL: redis://redis:6379/0
      BACKEND_CORS_ORIGINS: '["http://${VM_IP:-localhost}:3000"]'
      JWT_SECRET: ${JWT_SECRET:-ganti-di-produksi}
      MINIO_ENDPOINT: minio:9000
      MINIO_KEY: ${MINIO_ROOT_USER:-psd}
      MINIO_SECRET: ${MINIO_ROOT_PASSWORD:-psd-secret}
      MINIO_BUCKET: psd-assets
      STORAGE_ENABLED: "true"
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-psd}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-psd-secret}
      S3_MEDIA_BUCKET: psd-media
      S3_PUBLIC_BASE_URL: http://${VM_IP:-localhost}:9000/psd-media
      S3_ASSETS_BUCKET: psd-assets
      S3_ASSETS_PUBLIC_BASE_URL: http://${VM_IP:-localhost}:9000/psd-assets
      S3_SUBMISSIONS_BUCKET: psd-submissions
      APP_BASE_URL: http://${VM_IP:-localhost}:3000
      COOKIE_NAME: psd_token
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      DEV_EMAIL_ECHO: "true"
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_KEY:-psd-search-key}
      PSD_OFFICIAL_USERNAME: psd
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      FACTORY_RUN_TIMEOUT_S: ${FACTORY_RUN_TIMEOUT_S:-90}
      PSD_OIDC_ISSUER: http://${VM_IP:-localhost}:8000
      PSD_OAUTH_GIT_BASE_URL: http://${VM_IP:-localhost}:3001
      PSD_OAUTH_HUB_BASE_URL: http://${VM_IP:-localhost}:3002
      PSD_OAUTH_BI_BASE_URL: http://${VM_IP:-localhost}:3003
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ../psd-frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://${VM_IP:-localhost}:8000
        NEXT_PUBLIC_USE_MOCKS: "false"
        NEXT_PUBLIC_APP_NAME: Projek Sains Data
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
  meilidata:
