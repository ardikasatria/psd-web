services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: psd
      POSTGRES_PASSWORD: psd
      POSTGRES_DB: psd
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: psd
      MINIO_ROOT_PASSWORD: psd-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 psd psd-secret &&
      mc mb -p local/psd-assets || true &&
      mc anonymous set download local/psd-assets || true &&
      mc mb -p local/psd-media || true &&
      mc anonymous set download local/psd-media || true &&
      mc mb -p local/psd-submissions || true
      "

  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: psd-search-key
    ports: ["7700:7700"]
    volumes: ["meilidata:/meili_data"]

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://psd:psd@db:5432/psd
      REDIS_URL: redis://redis:6379/0
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      JWT_SECRET: ganti-di-produksi
    ports: ["8000:8000"]
    volumes: ["./:/code"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  miniodata:
  meilidata:
